<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="100%" height="130" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cyberPlayerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF66"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#FF007F"/>
    </linearGradient>
    
    <linearGradient id="vinylGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Glowing filters -->
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-mint" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg-panel {
      fill: #04050A;
      stroke: url(#cyberPlayerGrad);
      stroke-width: 1.5;
      rx: 12px;
    }
    .text-title {
      font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
      font-size: 11px;
      font-weight: bold;
      fill: #64748B;
      letter-spacing: 2px;
    }
    .track-title {
      font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
      font-size: 14px;
      font-weight: 900;
      fill: #E2E8F0;
    }
    .track-artist {
      font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
      font-size: 11px;
      fill: #00FF66;
      font-weight: bold;
    }
    .time-stamp {
      font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
      font-size: 10px;
      fill: #475569;
    }
    .control-btn {
      fill: #94A3B8;
      cursor: pointer;
    }
    .control-btn:hover {
      fill: #00FF66;
    }
  </style>

  <!-- Panel Border -->
  <rect x="1" y="1" width="798" height="128" rx="12" ry="12" class="bg-panel" style="filter: drop-shadow(0 8px 20px rgba(255, 0, 127, 0.08));" />

  <!-- Grid overlay -->
  <g opacity="0.02" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="30" x2="800" y2="30" />
    <line x1="0" y1="65" x2="800" y2="65" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="150" y1="0" x2="150" y2="130" />
  </g>

  <!-- ==================== LEFT AREA: SPINNING VINYL RECORD ==================== -->
  <g transform="translate(15, 0)">
    <!-- Vinyl Disc Outer Ring -->
    <g>
      <!-- Rotation Animation -->
      <animateTransform attributeName="transform" type="rotate" from="0 65 65" to="360 65 65" dur="5s" repeatCount="indefinite" />
      
      <!-- Vinyl grooves -->
      <circle cx="65" cy="65" r="48" fill="url(#vinylGrad)" stroke="#334155" stroke-width="0.5" />
      <circle cx="65" cy="65" r="42" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="10 3" opacity="0.5" />
      <circle cx="65" cy="65" r="35" fill="none" stroke="#475569" stroke-width="0.5" />
      <circle cx="65" cy="65" r="28" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="15 5" opacity="0.5" />
      
      <!-- Vinyl Center Label (NewJeans Tokki/Retro theme) -->
      <circle cx="65" cy="65" r="18" fill="#FF007F" />
      <circle cx="65" cy="65" r="14" fill="#00D4FF" />
      <path d="M 61 65 L 65 59 L 69 65 L 65 63 Z" fill="#FDE047" /> <!-- tiny star -->
      
      <!-- Center Spindle Hole -->
      <circle cx="65" cy="65" r="3" fill="#04050A" />
    </g>
  </g>

  <!-- ==================== CENTER AREA: TRACK DETAILS ==================== -->
  <g transform="translate(150, 0)">
    <!-- Now Playing Header -->
    <text x="0" y="32" class="text-title">NOW PLAYING // KOU STUDIO ROTATIONS</text>
    
    <!-- Track & Artist Info -->
    <text x="0" y="55" class="track-title">HYPNOTIZE x Cool With You</text>
    <text x="0" y="73" class="track-artist">XG × NewJeans</text>
    
    <!-- Animating Playback Progress Bar -->
    <g transform="translate(0, 85)">
      <!-- Backing bar -->
      <rect x="0" y="0" width="450" height="4" fill="#1E293B" rx="2" />
      <!-- Glowing active fill -->
      <rect x="0" y="0" width="220" height="4" fill="url(#cyberPlayerGrad)" rx="2" style="filter: drop-shadow(0 0 3px rgba(0, 255, 102, 0.4));">
        <animate attributeName="width" values="100;450;100" dur="15s" repeatCount="indefinite" />
      </rect>
    </g>
    
    <!-- Time Tracker -->
    <text x="450" y="102" class="time-stamp" text-anchor="end">02:18 / 03:45</text>
  </g>

  <!-- ==================== RIGHT AREA: INTERACTIVE PLAYBACK CONTROLS ==================== -->
  <g transform="translate(630, 40)">
    <!-- Skip Back Btn (⏮) -->
    <g class="control-btn" transform="translate(0, 5)">
      <polygon points="12,5 12,19 2,12" />
      <polygon points="22,5 22,19 12,12" />
      <line x1="2" y1="5" x2="2" y2="19" stroke-width="2" stroke-linecap="round" stroke="currentColor"/>
    </g>
    
    <!-- Play/Pause Btn (⏸) -->
    <g class="control-btn" transform="translate(38, 0)" style="filter: url(#glow-pink);">
      <circle cx="16" cy="16" r="20" fill="none" stroke="#FF007F" stroke-width="2" />
      <rect x="10" y="9" width="4" height="14" rx="1" fill="#FF007F" />
      <rect x="18" y="9" width="4" height="14" rx="1" fill="#FF007F" />
    </g>
    
    <!-- Skip Forward Btn (⏭) -->
    <g class="control-btn" transform="translate(90, 5)">
      <polygon points="12,5 12,19 22,12" />
      <polygon points="2,5 2,19 12,12" />
      <line x1="22" y1="5" x2="22" y2="19" stroke-width="2" stroke-linecap="round" stroke="currentColor"/>
    </g>

    <!-- Rave Mode Lamp -->
    <circle cx="138" cy="22" r="4" fill="#00FF66" style="filter: url(#glow-mint);">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="138" y="38" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">RAVE MODE</text>
  </g>
</svg>
